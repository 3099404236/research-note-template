name: Build Typst PDF

on:
  push:
    paths:
      - "paper/**/*.typ"
      - "paper/**/*.bib"
      - "paper/figures/**"
      - ".github/workflows/build-pdf.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra fonts-stix fonts-texgyre fonts-freefont-ttf

      - name: Compile PDF
        run: typst compile paper/main.typ paper/main.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: research-note-pdf
          path: paper/main.pdf
